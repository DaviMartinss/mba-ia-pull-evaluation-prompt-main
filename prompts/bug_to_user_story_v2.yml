      Bug Report: Erro 500 ao tentar exportar relatório com mais de 10.000 linhas. Sistema trava e usuário perde o trabalho. Acontece especialmente em relatórios de vendas mensais.

  - role: ai
    content: |
      # Título: Implementar exportação robusta para relatórios grandes

      ## História do Usuário
      Como **analista de vendas gerando relatórios mensais com grandes volumes de dados**,
      Eu quero **exportar relatórios com 10.000+ linhas sem erros ou travamentos**,
      Para que **eu possa analisar datasets completos sem perder trabalho ou dividir manualmente os dados**.

      ## Contexto e Justificativa
      **Situação Atual:** Exportações acima de 10.000 linhas geram erro HTTP 500 e travam a interface, forçando trabalho manual.

      **Impacto no Negócio:** Analistas perdem 2-3h/semana dividindo relatórios manualmente. Decisões baseadas em dados incompletos.

      **Valor Esperado:** Eliminar trabalho manual, permitir análises completas, reduzir time-to-insight de 3h para 15min.

      ## Critérios de Aceitação
      ### Cenário Principal (Happy Path)
      - [ ] **Dado** que solicito exportação de relatório com 10.000 a 100.000 linhas
           **Quando** clico em "Exportar para Excel"
           **Então** o sistema deve processar a exportação sem erro 500
           **E** o arquivo deve conter todas as linhas solicitadas (100% integridade)

      - [ ] **Dado** que exporto relatório de vendas mensal típico (15k-50k linhas)
           **Quando** o download conclui
           **Então** o arquivo Excel deve abrir corretamente e conter todos os dados

      ### Cenários Alternativos
      - [ ] **Dado** que a exportação demora mais que 5 segundos
           **Quando** o processamento está em andamento
           **Então** devo ver barra de progresso com percentual e tempo estimado

      - [ ] **Dado** que o relatório tem 50.000+ linhas
           **Quando** solicito exportação
           **Então** sistema deve processar em background e notificar quando concluir
           **E** devo poder continuar navegando no sistema

      - [ ] **Dado** que fecho a aba durante exportação em background
           **Quando** volto ao sistema
           **Então** devo ver notificação de que o arquivo está pronto para download

      ### Tratamento de Erros
      - [ ] **Dado** que ocorre timeout durante exportação
           **Quando** o servidor demora mais que limite configurado
           **Então** devo receber mensagem "Processamento demorou. Tente exportar em partes menores."
           **E** meus filtros devem ser preservados

      - [ ] **Dado** que ocorre erro de memória no servidor
           **Quando** a exportação falha
           **Então** devo ver mensagem amigável (não erro 500 genérico)
           **E** meu trabalho anterior não deve ser perdido

      ### Validações de Qualidade
      - [ ] **Dado** que QA testa performance de exportação
           **Quando** exporta 100.000 linhas
           **Então** deve completar em < 3 minutos sem erro

      - [ ] **Dado** que QA verifica integridade dos dados
           **Quando** compara arquivo exportado com dados originais
           **Então** 100% dos registros devem estar presentes e corretos

      - [ ] **Dado** que QA testa em diferentes navegadores
           **Quando** executa exportação em Chrome, Firefox, Safari, Edge
           **Então** comportamento deve ser consistente em todos

      ## Notas Técnicas
      **Do Bug Original:**
      - Erro atual: HTTP 500 em exportações >10.000 linhas
      - Contexto: relatórios de vendas mensais (15k-50k linhas típicas)
      - Comportamento: sistema trava e usuário perde trabalho

      **Sugestões de Implementação:**
      - Processar exportações grandes via fila assíncrona
      - Implementar streaming de dados
      - Considerar paginação ou split automático

      **Riscos e Dependências:**
      - Requer otimização de queries do banco
      - Pode necessitar aumento de timeout de proxy

  - role: human
    content: |
      Bug Report: Usuários reclamam que não conseguem editar perfil. Não aparece mensagem de erro.

  - role: ai
    content: |
      # Título: Corrigir edição de perfil e implementar feedback de erros

      ## História do Usuário
      Como **usuário cadastrado tentando atualizar informações do meu perfil**,
      Eu quero **conseguir salvar alterações com feedback claro de sucesso ou erro**,
      Para que **eu possa manter meus dados atualizados e entender quando algo dá errado**.

      ## Contexto e Justificativa
      **Situação Atual:** Usuários não conseguem editar perfil e não recebem mensagem de erro (falha silenciosa).

      **Impacto no Negócio:** Aumento de tickets de suporte. Dados desatualizados prejudicam comunicação.

      **Valor Esperado:** Reduzir tickets de suporte em 40%. Melhorar taxa de perfis completos de 45% para 70%.

      ## Critérios de Aceitação
      ### Cenário Principal (Happy Path)
      - [ ] **Dado** que acesso "Editar Perfil" com dados válidos
           **Quando** altero campos e clico em "Salvar"
           **Então** as alterações devem ser persistidas
           **E** devo ver mensagem "Perfil atualizado com sucesso"

      - [ ] **Dado** que altero múltiplos campos simultaneamente
           **Quando** clico em "Salvar"
           **Então** todos os campos alterados devem ser salvos em uma única operação

      ### Cenários Alternativos
      - [ ] **Dado** que tento salvar com email já cadastrado por outro usuário
           **Quando** clico em "Salvar"
           **Então** devo ver mensagem "Email já está em uso"
           **E** o campo email deve ser destacado em vermelho

      - [ ] **Dado** que preencho campo com formato inválido (ex: telefone com menos de 9 dígitos)
           **Quando** tento salvar
           **Então** devo ver mensagem "Formato inválido para telefone"
           **E** o campo telefone deve ser destacado em vermelho

      - [ ] **Dado** que deixo campo obrigatório vazio (ex: nome)
           **Quando** tento salvar
           **Então** devo ver mensagem "Campo nome é obrigatório"
           **E** salvamento NÃO deve ocorrer

      - [ ] **Dado** que tento salvar perfil com emoji em campo nome
           **Quando** clico em "Salvar"
           **Então** sistema deve aceitar e salvar corretamente

      ### Tratamento de Erros
      - [ ] **Dado** que ocorre erro de conexão durante salvamento
           **Quando** a requisição falha
           **Então** devo ver mensagem "Erro ao salvar. Verifique sua conexão"
           **E** minhas alterações devem ser preservadas no formulário

      - [ ] **Dado** que ocorre erro inesperado no servidor
           **Quando** o sistema falha
           **Então** devo ver mensagem "Erro inesperado ao salvar perfil. Tente novamente mais tarde."
           **E** erro deve ser logado para análise

      - [ ] **Dado** que tento salvar perfil com campo telefone em formato inválido
           **Quando** clico em "Salvar"
           **Então** sistema NÃO deve permitir salvar e deve exibir mensagem "Formato inválido para telefone"

      ### Validações de Qualidade
      - [ ] **Dado** que QA mede tempo de resposta do salvamento
           **Quando** salva alterações no perfil
           **Então** deve responder em < 2 segundos

      - [ ] **Dado** que usuário com screen reader está na página
           **Quando** mensagem de erro é exibida
           **Então** screen reader deve anunciar a mensagem automaticamente

      - [ ] **Dado** que QA testa em diferentes navegadores
           **Quando** edita e salva perfil em Chrome, Firefox, Safari, Edge
           **Então** comportamento deve ser funcional e consistente em todos

      ## Notas Técnicas
      **Do Bug Original:**
      - Sintoma: Edição de perfil não funciona
      - Problema crítico: Não aparece mensagem de erro (falha silenciosa)
      - [Validar: quais campos afetados?]
      - [Validar: erro em quais navegadores?]

      **Sugestões de Implementação:**
      - Implementar validação client-side e server-side
      - Adicionar error boundaries para erros inesperados
      - Implementar logging estruturado

      **Riscos e Dependências:**
      - Requer análise de logs para identificar causa raiz

  - role: human
    content: |
      Bug Report: Página de checkout demora muito para carregar em horário de pico (18h-20h). Clientes desistem da compra.

  - role: ai
    content: |
      # Título: Otimizar performance do checkout para horários de pico

      ## História do Usuário
      Como **cliente pronto para finalizar uma compra durante horário de pico (18h-20h)**,
      Eu quero **que a página de checkout carregue rapidamente (< 3 segundos)**,
      Para que **eu possa concluir minha compra sem frustração ou desistência**.

      ## Contexto e Justificativa
      **Situação Atual:** Página de checkout demora excessivamente no horário de pico, causando abandono de carrinho.

      **Impacto no Negócio:** Estimativa de 25-30% de abandono entre 18h-20h. Perda de R$ 150k-200k/mês em vendas.

      **Valor Esperado:** Reduzir abandono para < 10% no pico. Recuperar R$ 120k/mês em vendas.

      ## Critérios de Aceitação
      ### Cenário Principal (Happy Path)
      - [ ] **Dado** que acesso checkout durante horário de pico (18h-20h)
           **Quando** a página é solicitada
           **Então** o conteúdo principal deve estar visível em < 3 segundos
           **E** a página deve estar interativa em < 5 segundos

      ### Cenários Alternativos
      - [ ] **Dado** que acesso durante carga extrema (Black Friday)
           **Quando** sistema está sob stress
           **Então** página deve degradar gracefully se necessário
           **E** checkout core deve funcionar

      - [ ] **Dado** que estou em conexão lenta (3G)
           **Quando** acesso checkout
           **Então** componentes pesados devem ser lazy-loaded

      ### Tratamento de Erros
      - [ ] **Dado** que backend está lento (> 5s)
           **Quando** aguardo resposta
           **Então** devo ver indicador de loading claro

      - [ ] **Dado** que serviço secundário falha (frete, cupons)
           **Quando** timeout ocorre
           **Então** checkout deve continuar com valores fallback

      ### Validações de Qualidade
      - [ ] **Dado** que QA mede tempo de carregamento no pico (18h-20h)
           **Quando** acessa página de checkout
           **Então** load time deve ser < 3s no pico e < 2s normal

      - [ ] **Dado** que QA mede Time to Interactive (TTI)
           **Quando** página carrega em horário de pico
           **Então** TTI deve ser < 5 segundos

      - [ ] **Dado** que QA verifica Core Web Vitals
           **Quando** analisa métricas da página
           **Então** LCP < 2.5s, FID < 100ms, CLS < 0.1

      - [ ] **Dado** que QA executa teste de carga
           **Quando** simula 5x a carga normal
           **Então** sistema deve manter performance sem degradação crítica

      ## Notas Técnicas
      **Do Bug Original:**
      - Sintoma: Lentidão extrema em checkout
      - Timing: Horário de pico (18h-20h)
      - Consequência: Abandono de carrinho e perda de vendas
      - [Validar: tempo atual no pico]
      - [Validar: métricas de abandono por horário]

      **Sugestões de Implementação:**
      - Caching agressivo de dados estáticos
      - Otimizar queries de banco
      - CDN para assets estáticos
      - Redis/Memcached para cache
      - Code splitting e lazy loading
      - Auto-scaling baseado em horário

      **Riscos e Dependências:**
      - Requer análise de APM para identificar gargalos
      - Pode necessitar upgrade de infraestrutura

